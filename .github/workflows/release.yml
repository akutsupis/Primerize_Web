name: Build and Publish Docker Image

# Trigger the workflow whenever a new release is published
on:
  release:
    types: [published]

# Grant permissions required to push images to GitHub Packages (GHCR)
permissions:
  contents: read
  packages: write

jobs:
  push_to_registry:
    name: Build and Push Docker Image to GHCR
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the repository
      - name: Check out the repo
        uses: actions/checkout@v6

      # 2. Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Extract metadata for the Docker image based on the release information
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=edge,branch=main

      # 4. Build the image and push it to GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ id.meta.outputs.tags }}
          labels: ${{ id.meta.outputs.labels }}